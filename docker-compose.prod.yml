# -----------------------------------------------------------------------------
# Nexus — production host pulls ONLY the push registry (NEXUS_PUSH_REGISTRY).
# CI build:production mirrors maas-proxy images into maas-hosted on the push registry
# (same pattern as Redis). deploy:production docker login uses NEXUS_PUSH_* only.
#
# - backend: NEXUS_PUSH_IMAGE / maas-hosted/maas-backend (CI sed pins tag on deploy).
# - redis, postgres, pgadmin: ${NEXUS_PUSH_REGISTRY}/maas-hosted/<image>:<tag>
# -----------------------------------------------------------------------------

services:
  backend:
    image: ${NEXUS_PUSH_IMAGE:-vortex.kronshtadt.ru:8443/maas-hosted/maas-backend:latest}
    #build:
    #  context: .
    #  args:
    #    - LINUX_PROXY_URL=${LINUX_PROXY_URL}
    container_name: backend
    environment:
      CORS_ORIGINS: '["*"]'
      CORS_ALLOW_CREDENTIALS: "true"
      CORS_ALLOW_METHODS: '["*"]'
      CORS_ALLOW_HEADERS: '["*"]'
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_STREAM_PREFIX: "bitrix:"
      BITRIX_WORKER_ENABLED: "true"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - maas-internal
      #- maas-backend-stl_backend-network
      - traefik-global-proxy
    labels:
    #   # Enable Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-global-proxy"

    #   # Router configuration (update domain as needed)
    #  - "traefik.http.routers.lk-api-int.rule=Host(`maas.int.kronshtadt.ru`) && PathPrefix(`/api/v3/`)"
      - "traefik.http.routers.lk-api-int.rule=Host(`${TRAEFIK_HOST:-10.33.42.18}`) && PathPrefix(`/api/v3/`)"
#      - "traefik.http.routers.lk-api-int.rule=Host(`maas.aeromax-group.ru`) && PathPrefix(`/api/v3/`)"
      - "traefik.http.routers.lk-api-int.entrypoints=https"
      - "traefik.http.routers.lk-api-int.tls=true"
      - "traefik.http.routers.lk-api-int.middlewares=strip-api-prefix@docker,cors@file"

#      - "traefik.http.routers.lk-api-pub.rule=Host(`maas.aeromax-group.ru`) && PathPrefix(`/api/v3/`)"
#      - "traefik.http.routers.lk-api-pub.entrypoints=https"
#      - "traefik.http.routers.lk-api-pub.tls=true"
#      - "traefik.http.routers.lk-api-pub.middlewares=strip-api-prefix@docker"


      - "traefik.http.middlewares.strip-api-prefix.stripprefix.prefixes=/api/v3/"

    #   # Service configuration
      - "traefik.http.services.lk-api.loadbalancer.server.port=8000"
      - "traefik.http.services.lk-api.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.lk-api.loadbalancer.healthcheck.interval=30s"

    #   # Security headers middleware
    #   - "traefik.http.middlewares.lk-api-headers.headers.customresponseheaders.X-Frame-Options=DENY"
    #   - "traefik.http.middlewares.lk-api-headers.headers.customresponseheaders.X-Content-Type-Options=nosniff"
    #   - "traefik.http.middlewares.lk-api-headers.headers.customresponseheaders.X-XSS-Protection=1; mode=block"
    #   - "traefik.http.middlewares.lk-api-headers.headers.customresponseheaders.Strict-Transport-Security=max-age=31536000; includeSubDomains"

    #   # Apply middleware
    #   - "traefik.http.routers.lk-api.middlewares=lk-api-headers"
    volumes:
      - ./.env:/app/.env
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./scripts:/app/scripts
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  redis:
    image: ${NEXUS_PUSH_REGISTRY:-nexus.maas.int.kronshtadt.ru:443}/maas-hosted/redis:8.2.3
    container_name: redis
    command: redis-server --appendonly no --save ""
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - maas-internal
      - traefik-global-proxy
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  postgres:
    image: ${NEXUS_PUSH_REGISTRY:-nexus.maas.int.kronshtadt.ru:443}/maas-hosted/postgres:18
    container_name: maas-prod-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-maas_backend}
      POSTGRES_USER: ${POSTGRES_USER:-maas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maas_local_pass}
    volumes:
      - ./postgres-data-prod:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maas_user} -d ${POSTGRES_DB:-maas_backend}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - maas-internal

  pgadmin:
    image: ${NEXUS_PUSH_REGISTRY:-nexus.maas.int.kronshtadt.ru:443}/maas-hosted/dpage/pgadmin4:9
    container_name: maas-prod-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change-me}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
    volumes:
      - ./config/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./config/pgadmin/pgpass:/pgadmin4/pgpass:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - maas-internal
      - traefik-global-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-global-proxy"
      - "traefik.http.routers.maas-pgadmin.rule=Host(`${PGADMIN_TRAEFIK_HOST:-pgadmin.maas.int.kronshtadt.ru}`)"
      - "traefik.http.routers.maas-pgadmin.entrypoints=https"
      - "traefik.http.routers.maas-pgadmin.tls=true"
      - "traefik.http.services.maas-pgadmin.loadbalancer.server.port=80"

networks:
  maas-internal:
    external: true
  #maas-backend-stl_backend-network:
  traefik-global-proxy:
    external: true


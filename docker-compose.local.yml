# Local dev stack: backend + redis + postgres + pgadmin.
# Environment: LOCAL MACHINE ONLY — not for dev/prod servers.
# Usage: docker compose -f docker-compose.local.yml up --build
# Requires external network: docker network create maas-shared

services:

  redis:
    image: redis:8.2.3
    container_name: redis
    command: redis-server --appendonly no --save ""
    restart: unless-stopped
    networks:
      - maas-shared

  backend:
    build:
      context: .
      dockerfile: Dockerfile.local
    image: shop-backend-local
    container_name: backend
    ports:
      - "8000:8000"
    env_file:
      - ./.env.local
    environment:
      CORS_ORIGINS: '["*"]'
      CORS_ALLOW_CREDENTIALS: "true"
      CORS_ALLOW_METHODS: '["*"]'
      CORS_ALLOW_HEADERS: '["*"]'
      CALCULATOR_BASE_URL: "http://backend-calc:7000"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_STREAM_PREFIX: "bitrix:"
      BITRIX_WORKER_ENABLED: "true"
      BITRIX_ENABLED: "true"
      BITRIX_VERIFY_TLS: "false"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./backend:/app/backend
      - ./scripts:/app/scripts
    restart: unless-stopped
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - maas-shared

  postgres:
    image: postgres:18
    container_name: postgres
    environment:
      POSTGRES_DB: maas_backend
      POSTGRES_USER: ${POSTGRES_USER:-maas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maas_local_pass}
    volumes:
      - ./postgres-data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maas_user} -d maas_backend"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - maas-shared

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-pgadmin_local}
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
    ports:
      - "5050:80"
    volumes:
      - ./config/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./config/pgadmin/pgpass:/pgadmin4/pgpass:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - maas-shared

networks:
  maas-shared:
    external: true
